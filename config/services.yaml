services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: true

    c975L\SiteBundle\Command\:
        resource: '../src/Command/*'

    c975L\SiteBundle\Controller\:
        resource: '../src/Controller/*'

    c975L\SiteBundle\Listener\:
        resource: '../src/Listener/*'

    c975L\SiteBundle\Listener\MaintenanceListener:
        arguments:
            $maintenanceMode: '%env(bool:default::MAINTENANCE_MODE)%'
            $secretToken: '%env(default::MAINTENANCE_TOKEN)%'
        tags:
            - { name: kernel.event_listener, event: kernel.request, priority: 10 }

    c975L\SiteBundle\Namer\:
        resource: '../src/Namer/*'

    c975L\SiteBundle\Repository\:
        resource: '../src/Repository/*'

    c975L\SiteBundle\Service\:
        resource: '../src/Service/*'

    c975L\SiteBundle\Twig\:
        resource: '../src/Twig/*'