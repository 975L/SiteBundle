services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: true

    c975L\SiteBundle\:
        resource: '../src/'
        exclude: '../src/{DependencyInjection,Entity,Messenger,Service/Security}'

    # Only decorates NelmioSecurityBundle's nonce generator if the app installed it (SiteBundle doesn't require it) - see SessionNonceGenerator for why. decoration_on_invalid: ignore drops this definition entirely when nelmio_security.nonce_generator doesn't exist, so it's a no-op otherwise
    c975L\SiteBundle\Service\Security\SessionNonceGenerator:
        decorates: nelmio_security.nonce_generator
        decoration_on_invalid: ignore

    # VichUploaderBundle only registers its concrete UploaderHelper as a service, no alias for its own
    # interface - CollectionItemSourceProvider autowires against the interface for testability
    Vich\UploaderBundle\Templating\Helper\UploaderHelperInterface: '@Vich\UploaderBundle\Templating\Helper\UploaderHelper'

    c975L\SiteBundle\Management\TemplateRegistry:
        arguments:
            $providers: !tagged_iterator c975l.template_provider

    c975L\SiteBundle\Service\StylesheetProvider:
        tags:
            - { name: 'ui.stylesheet', priority: 100 }

    c975L\SiteBundle\Service\ScriptProvider:
        tags:
            - { name: 'ui.script', priority: 100 }
            - { name: 'ui.admin_script', priority: 100 }

    site.block.legal_model:
        class: stdClass
        tags:
            - name: ui.block
              kind: legal_model
              label: "block.legal_model"
              description: "block.legal_model_description"
              translation_domain: 'site'
              form: c975L\SiteBundle\Form\Block\LegalModelType
              template: '@c975LSite/blocks/LegalModel.html.twig'
              category: 'label.category_legal'
              pickable: true
              cacheable: true

    site.block.twig_content:
        class: stdClass
        tags:
            - name: ui.block
              kind: twig_content
              label: "block.twig_content"
              description: "block.twig_content_description"
              translation_domain: 'site'
              form: c975L\SiteBundle\Form\Block\TwigContentType
              template: '@c975LSite/blocks/TwigContent.html.twig'
              category: 'label.category_twig'
              pickable: true
              # Not cacheable: on a collection's detail Page, its output varies per request with
              # "collectionItem" (see CollectionItemContext) - a persisted Block's id-keyed cache
              # (BlockExtension::renderBlock()) has no way to see that, and would otherwise serve
              # whichever item first got cached to every other item's URL
              cacheable: false

    site.block.articles_slider:
        class: stdClass
        tags:
            - name: ui.block
              kind: articles_slider
              label: "block.articles_slider"
              description: "block.articles_slider_description"
              translation_domain: 'site'
              form: c975L\SiteBundle\Form\Block\ArticlesSliderType
              template: '@c975LSite/blocks/ArticlesSlider.html.twig'
              category: 'label.category_navigation'
              pickable: true
              cacheable: true

    site.block.menu_link:
        class: stdClass
        tags:
            - name: ui.block
              kind: menu_link
              label: "block.menu_link"
              description: "block.menu_link_description"
              translation_domain: 'site'
              form: c975L\SiteBundle\Form\Block\MenuLinkType
              template: '@c975LSite/blocks/MenuLink.html.twig'
              category: 'label.category_navigation'
              pickable: true
              cacheable: false
              contexts: menu
